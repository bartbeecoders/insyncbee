server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Healthcheck for k8s liveness/readiness probes
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Cache hashed assets aggressively
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Binary releases (populated by upload-release.sh into a mounted volume)
    location /releases/ {
        # No caching on install binaries so users always get the latest
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Disposition "attachment";
        # Disable gzip for binary content
        gzip off;
        try_files $uri =404;
    }

    # SPA fallback — send unknown paths to index.html so client-side routing
    # (if added later) works. Does not match /releases/ or /assets/.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Short cache on index.html so deploys are seen immediately
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
