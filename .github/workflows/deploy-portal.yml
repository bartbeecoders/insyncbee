name: Deploy portal

# Builds the insyncbee-portal Docker image, pushes it to GHCR and rolls it out
# to the k3s VPS via SSH.
#
# Triggers:
#   * push to main affecting the portal sources or its k8s manifests
#   * any v* tag (so a release deploys the same version of the portal)
#   * manual dispatch (lets you re-deploy without committing anything)
#
# Required repository secrets:
#   K3S_SSH_HOST          - VPS hostname or IP   (default: 212.47.77.32)
#   K3S_SSH_USER          - VPS user             (default: bart)
#   K3S_SSH_PRIVATE_KEY   - PEM private key with shell access on the VPS
#   K3S_SSH_KNOWN_HOSTS   - output of `ssh-keyscan -H <host>` for the VPS
#
# The GHCR package must be public (Settings → Packages → insyncbee-portal →
# change visibility) so the cluster can pull it without an imagePullSecret.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "insyncbee.portal/**"
      - "k8s/portal/**"
      - "releases.json"
      - ".github/workflows/deploy-portal.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to build/deploy (e.g. 0.1.0)."
        required: false
        default: ""

permissions:
  contents: read
  packages: write   # push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/insyncbee-portal
  NAMESPACE: insyncbee
  REMOTE_K8S_DIR: insyncbee/k8s

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
      image: ${{ steps.ver.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(jq -r .version insyncbee.portal/package.json)"
          fi
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}"
          echo "version=${VERSION}"        >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}"            >> "$GITHUB_OUTPUT"
          echo "Resolved version=${VERSION} image=${IMAGE}"

      - name: Stage releases.json into build context
        run: cp releases.json insyncbee.portal/releases.json

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./insyncbee.portal
          file: ./insyncbee.portal/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.version }}
            ${{ steps.ver.outputs.image }}:latest
            ${{ steps.ver.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-22.04
    environment: production
    concurrency:
      group: deploy-portal
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.K3S_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.K3S_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [[ -n "${SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            echo "WARNING: K3S_SSH_KNOWN_HOSTS not set; falling back to accept-new"
          fi
          chmod 644 ~/.ssh/known_hosts 2>/dev/null || true

      - name: Configure host vars
        run: |
          echo "VPS_HOST=${VPS_HOST:-${{ secrets.K3S_SSH_HOST }}}" >> "$GITHUB_ENV"
          echo "VPS_USER=${VPS_USER:-${{ secrets.K3S_SSH_USER }}}" >> "$GITHUB_ENV"
        env:
          VPS_HOST: ${{ secrets.K3S_SSH_HOST }}
          VPS_USER: ${{ secrets.K3S_SSH_USER }}

      - name: Render manifests
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p rendered
          cp k8s/portal/namespace.yaml rendered/
          cp k8s/portal/ingress.yaml   rendered/
          # Pin deployment to the freshly built image+tag
          sed \
            -e "s#image: .*insyncbee-portal:.*#image: ${IMAGE}:${VERSION}#" \
            k8s/portal/deployment.yaml > rendered/deployment.yaml
          echo "--- rendered/deployment.yaml ---"
          grep -n "image:" rendered/deployment.yaml

      - name: Copy manifests to VPS
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=accept-new"
          ssh $SSH_OPTS "${VPS_USER}@${VPS_HOST}" "mkdir -p ${REMOTE_K8S_DIR}/portal && sudo mkdir -p /srv/insyncbee/releases && sudo chmod 0755 /srv/insyncbee/releases"
          scp $SSH_OPTS rendered/*.yaml "${VPS_USER}@${VPS_HOST}:${REMOTE_K8S_DIR}/portal/"

      - name: Apply & rollout
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=accept-new"
          REMOTE_CMD=$(cat <<'EOF'
          set -euo pipefail
          KCTL() { if command -v kubectl >/dev/null 2>&1; then kubectl "$@"; else sudo k3s kubectl "$@"; fi; }
          KCTL apply -f ~/insyncbee/k8s/portal/namespace.yaml
          KCTL apply -f ~/insyncbee/k8s/portal/deployment.yaml
          KCTL apply -f ~/insyncbee/k8s/portal/ingress.yaml || true
          KCTL -n insyncbee set image deployment/insyncbee-portal portal=__IMAGE__:__VERSION__
          KCTL -n insyncbee rollout status deployment/insyncbee-portal --timeout=120s
          KCTL -n insyncbee get pods,svc,ingress
          EOF
          )
          REMOTE_CMD="${REMOTE_CMD//__IMAGE__/${IMAGE}}"
          REMOTE_CMD="${REMOTE_CMD//__VERSION__/${VERSION}}"
          ssh $SSH_OPTS "${VPS_USER}@${VPS_HOST}" "bash -lc $(printf %q "$REMOTE_CMD")"

      - name: Summary
        run: |
          echo "### Deployed insyncbee-portal" >> "$GITHUB_STEP_SUMMARY"
          echo "* Image:  \`${{ needs.build-and-push.outputs.image }}:${{ needs.build-and-push.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "* URL:    https://insyncbee.dev"   >> "$GITHUB_STEP_SUMMARY"
          echo "* NodePort fallback: http://${{ secrets.K3S_SSH_HOST }}:32081" >> "$GITHUB_STEP_SUMMARY"
