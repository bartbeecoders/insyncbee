name: Release db-service

# Builds the insyncbee-db-service (the daemon binary) for Linux, macOS and
# Windows on every v* tag and attaches the archives to a GitHub Release.
#
# Tagging v0.1.0 produces a release at:
#   https://github.com/bartbeecoders/insyncbee/releases/tag/v0.1.0
# whose asset filenames match those in releases.json so the portal download
# page links resolve directly.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g. 0.1.0). Used only for manual runs."
        required: true
        default: "0.1.0"

permissions:
  contents: write   # needed to create the GitHub Release

env:
  BIN_NAME: insyncbee
  ARCHIVE_BASENAME: insyncbee-db-service

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - label: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - label: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - label: windows-x86_64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build daemon
        shell: bash
        run: cargo build --release --locked -p insyncbee-daemon --target ${{ matrix.target }}

      - name: Stage binary
        id: stage
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          STAGE="stage/${ARCHIVE_BASENAME}-${VERSION}-${{ matrix.label }}"
          mkdir -p "$STAGE"
          if [[ "${{ matrix.runner }}" == windows-* ]]; then
            cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "$STAGE/"
          else
            cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$STAGE/"
          fi
          # Drop a tiny README so users know what the archive contains
          cat > "$STAGE/README.txt" <<EOF
          InSyncBee db-service ${VERSION} (${{ matrix.label }})

          The 'insyncbee' binary is the background sync service.
          Run 'insyncbee --help' for usage.
          EOF
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          ARCHIVE="${ARCHIVE_BASENAME}-${VERSION}-${{ matrix.label }}.tar.gz"
          tar -C "${{ steps.stage.outputs.stage }}" -czf "$ARCHIVE" .
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE_PATH=$ARCHIVE" >> "$GITHUB_ENV"
          echo "CHECKSUM_PATH=$ARCHIVE.sha256" >> "$GITHUB_ENV"

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          $archive = "$env:ARCHIVE_BASENAME-$env:VERSION-${{ matrix.label }}.zip"
          $stageDir = "${{ steps.stage.outputs.stage }}"
          Compress-Archive -Path "$stageDir/*" -DestinationPath $archive -Force
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii "$archive.sha256"
          "ARCHIVE_PATH=$archive" | Out-File -Append -Encoding ascii $env:GITHUB_ENV
          "CHECKSUM_PATH=$archive.sha256" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: db-service-${{ matrix.label }}
          path: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.CHECKSUM_PATH }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: InSyncBee ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
